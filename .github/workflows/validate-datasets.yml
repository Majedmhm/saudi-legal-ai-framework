name: Validate Datasets

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate CSV Datasets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate main dataset
        run: python3 scripts/validate_dataset.py

      - name: Validate example datasets
        run: |
          failed=0
          for f in datasets/examples/*.csv; do
            echo "──────────────────────────────────────────"
            echo "Validating: $f"
            echo "──────────────────────────────────────────"
            if ! python3 scripts/validate_dataset.py --file "$f"; then
              failed=1
            fi
          done
          exit $failed
